# Builds the µCSS marketing demos and publishes them to GitHub Pages.
# Enable once: repo Settings → Pages → Build and deployment → Source: GitHub Actions.

name: Demo pages

on:
  push:
    branches: [master]
    paths:
      - "demos/**"
      - "gulp-mu-css/**"
      - "gulp-mu-ps/**"
      - "gulp-mu-au/**"
      - "tools/build-demos.mjs"
      - "gulpfile.mjs"
      - ".github/workflows/demo-pages.yml"
  workflow_dispatch:

concurrency:
  group: demo-pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: |
          npm ci --include=dev
          npm ci --prefix gulp-mu-ps
          npm ci --prefix gulp-mu-au
          npm ci --prefix gulp-mu-css

      - name: Build demos
        run: node tools/build-demos.mjs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: demos

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
