# Publishes the µCSS marketing demos to GitHub Pages.
# Enable once: repo Settings → Pages → Build and deployment → Source: GitHub Actions.
#
# The demos/*/dist/ folders are tracked in git (built locally via npx gulp demos:build).
# CI rebuild is optional — see tools/ci-install-demos.mjs for a local/CI install helper.

name: Demo pages

on:
  push:
    branches: [master]
    paths:
      - "demos/**"
      - ".github/workflows/demo-pages.yml"
  workflow_dispatch:

concurrency:
  group: demo-pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy-pages:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify demo output
        run: |
          test -f demos/index.html
          test -f demos/glittery/dist/demo.css
          test -f demos/flyex/dist/demo.css
          ls -la demos/glittery/dist demos/flyex/dist

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: demos

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
